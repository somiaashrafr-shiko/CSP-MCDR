<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات المراجعة - مصر المقاصة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo-container">
                <div class="logo">MCDR</div>
                <div class="header-title">تسوية زيادة رأس المال - مصر المقاصة</div>
            </div>
            <a href="index.html" class="btn btn-secondary" style="text-decoration: none;">تسجيل الخروج</a>
        </header>

        <main class="main-content">
            <div class="dashboard-content-area" style="max-width: 1000px; margin: 0 auto;">
                <h2 class="card-title" style="font-size: 2rem; margin-bottom: 3rem;">طلبات تسوية زيادة رأس المال الواردة</h2>
                
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    
                    <!-- Request 1 -->
                    <a href="makkasa_details.html" style="text-decoration: none; color: inherit;">
                        <div class="card" style="cursor: pointer; margin: 0; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s;">
                            <div>
                                <div style="font-size: 1.4rem; font-weight: 800; margin-bottom: 0.5rem; color: var(--primary);">شركة النيل للبرمجيات</div>
                                <div style="color: var(--text-light); font-size: 1rem; font-weight: 500;">
                                    اخر رأس مال مسجل (هيئة الاستثمار): <span style="color: var(--text);">10,000,000 ج.م</span>
                                </div>
                            </div>
                            <div>
                                <span class="status-badge status-pending" style="padding: 0.75rem 1.5rem; font-size: 1rem;">قيد المراجعة</span>
                            </div>
                        </div>
                    </a>

                    <!-- Request 2 -->
                    <a href="makkasa_details.html" style="text-decoration: none; color: inherit;">
                        <div class="card" style="cursor: pointer; margin: 0; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s;">
                            <div>
                                <div style="font-size: 1.4rem; font-weight: 800; margin-bottom: 0.5rem; color: var(--primary);">المجموعة المالية المتطورة</div>
                                <div style="color: var(--text-light); font-size: 1rem; font-weight: 500;">
                                    اخر رأس مال مسجل (هيئة الاستثمار): <span style="color: var(--text);">50,000,000 ج.م</span>
                                </div>
                            </div>
                            <div>
                                <span class="status-badge status-pending" style="padding: 0.75rem 1.5rem; font-size: 1rem;">قيد المراجعة</span>
                            </div>
                        </div>
                    </a>

                </div>
            </div>
        </main>
    </div>
</body>
</html>
