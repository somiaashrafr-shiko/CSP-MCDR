<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسوية زيادة رأس المال - تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo-container">
                <div class="logo">MCDR</div>
                <div class="header-title">تسوية زيادة رأس المال - مصر المقاصة</div>
            </div>
        </header>

        <main class="main-content">
            <div class="card login-card">
                <h2 class="card-title">تسجيل الدخول</h2>
                
                <div class="form-group" style="text-align: right;">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" class="form-input" placeholder="أدخل اسم المستخدم">
                </div>
                <div class="form-group" style="text-align: right;">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" class="form-input" placeholder="أدخل كلمة المرور">
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <a href="investor.html" class="btn btn-primary" style="flex: 1; text-decoration: none;">دخول المستثمر</a>
                    <a href="makkasa.html" class="btn btn-secondary" style="flex: 1; text-decoration: none;">دخول مصر المقاصة</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
